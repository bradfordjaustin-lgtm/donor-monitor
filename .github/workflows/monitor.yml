name: Donor Vial Monitor

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes
  workflow_dispatch:         # allows manual run from GitHub

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      # ── Primary state persistence: restore from repo ─────────────────────
      # The previous run committed last_state.json back to the repo.
      # This checkout already has it; no extra step needed.

      # ── Fallback state persistence: Actions cache ─────────────────────────
      # If the repo commit hasn't landed yet (e.g. race condition between
      # two simultaneous runs), the cache gives us the most recent state.
      - name: Restore state cache (fallback)
        uses: actions/cache@v4
        with:
          path: last_state.json
          key: donor-state-${{ github.run_id }}
          restore-keys: donor-state-

      - name: Run monitor
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python monitor.py

      # ── Save state back to repo (primary) ────────────────────────────────
      - name: Commit state file to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_state.json
          git diff --staged --quiet || git commit -m "chore: update last_state.json [skip ci]"
          git push

      # ── Save state to cache (fallback) ───────────────────────────────────
      # The cache action auto-saves at job end due to the restore-keys match above.
      # No explicit save step needed; actions/cache handles it automatically.
